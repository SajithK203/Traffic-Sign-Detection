<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      
      /* Bounding box drawing animation */
      .box { 
        fill: none; 
        stroke: #00ffcc; 
        stroke-width: 4; 
        stroke-dasharray: 600;
        stroke-dashoffset: 600;
        animation: drawBox 4s ease-in-out infinite;
      }
      
      /* YOLO label popping up */
      .label-group {
        opacity: 0;
        animation: fadeIn 4s ease-in-out infinite;
      }
      
      /* Scanning laser line */
      .laser {
        fill: rgba(0, 255, 204, 0.5);
        animation: scan 4s linear infinite;
      }
      
      @keyframes drawBox {
        0% { stroke-dashoffset: 600; }
        25% { stroke-dashoffset: 0; }
        80% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 600; }
      }
      
      @keyframes fadeIn {
        0%, 15% { opacity: 0; transform: translateY(10px); }
        25%, 80% { opacity: 1; transform: translateY(0); }
        90%, 100% { opacity: 0; transform: translateY(-10px); }
      }
      
      @keyframes scan {
        0%, 15% { transform: translateY(-10px); opacity: 0; }
        25% { transform: translateY(-10px); opacity: 1; }
        75% { transform: translateY(130px); opacity: 1; }
        80%, 100% { transform: translateY(130px); opacity: 0; }
      }
      
      /* Background floating particles */
      .particle {
        fill: #30363d;
        animation: float 10s linear infinite;
      }
      @keyframes float {
        from { transform: translateX(-100px); }
        to { transform: translateX(900px); }
      }
    </style>
  </defs>
  
  <!-- Dark mode background matching GitHub -->
  <rect class="bg" width="800" height="300" rx="10" />
  
  <!-- Particles -->
  <circle cx="100" cy="50" r="3" class="particle" style="animation-duration: 8s; animation-delay: 0s;" />
  <circle cx="200" cy="250" r="5" class="particle" style="animation-duration: 12s; animation-delay: -5s;" />
  <circle cx="600" cy="80" r="4" class="particle" style="animation-duration: 9s; animation-delay: -2s;" />
  <circle cx="50" cy="200" r="2" class="particle" style="animation-duration: 15s; animation-delay: -8s;" />
  
  <!-- Stylized Road Scene -->
  <path d="M 0 260 L 800 260" stroke="#21262d" stroke-width="80"/>
  <path d="M 0 260 L 800 260" stroke="#8b949e" stroke-width="4" stroke-dasharray="40 40"/>
  
  <!-- Traffic Sign 1: Prohibitory (Speed Limit) -->
  <g transform="translate(250, 70)">
    <rect x="45" y="90" width="10" height="100" fill="#484f58" />
    <circle cx="50" cy="50" r="45" fill="#ffffff" stroke="#ff3366" stroke-width="12" />
    <text x="50" y="65" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#0d1117" text-anchor="middle">50</text>
  </g>
  
  <!-- Traffic Sign 2: Mandatory (Turn Right) -->
  <g transform="translate(500, 100)">
    <rect x="35" y="70" width="8" height="90" fill="#484f58" />
    <circle cx="40" cy="40" r="35" fill="#3399ff" />
    <path d="M 25 40 L 45 40 L 45 25 M 40 15 L 55 40 L 40 65" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
  
  <!-- YOLO Detection Overlay 1 -->
  <g transform="translate(250, 70)">
    <!-- Bounding Box -->
    <rect x="-5" y="-5" width="110" height="110" rx="4" class="box" />
    <!-- Scanner -->
    <rect x="-5" y="0" width="110" height="2" class="laser" />
    <!-- Label -->
    <g class="label-group">
      <rect x="-5" y="-30" width="155" height="25" rx="4" fill="#00ffcc" />
      <text x="5" y="-13" font-family="monospace" font-size="14" font-weight="bold" fill="#0d1117">prohibitory 0.98</text>
    </g>
  </g>
  
  <!-- YOLO Detection Overlay 2 -->
  <g transform="translate(500, 100)">
    <rect x="-5" y="-5" width="90" height="90" rx="4" class="box" style="animation-delay: 0.5s;" />
    <rect x="-5" y="0" width="90" height="2" class="laser" style="animation-delay: 0.5s;" />
    <g class="label-group" style="animation-delay: 0.5s;">
      <rect x="-5" y="-30" width="145" height="25" rx="4" fill="#00ffcc" />
      <text x="5" y="-13" font-family="monospace" font-size="14" font-weight="bold" fill="#0d1117">mandatory 0.96</text>
    </g>
  </g>

</svg>
